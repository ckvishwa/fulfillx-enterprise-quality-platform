services:
  postgres:
    image: postgres:18-alpine
    container_name: fulfillx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fulfillx_orders}
      POSTGRES_USER: ${POSTGRES_USER:-fulfillx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fulfillx}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18+ images expect the volume mounted at the parent
      # directory (not .../data) so pg_ctlcluster-style upgrades work.
      - postgres-data:/var/lib/postgresql
      # Creates the fulfillx_auth database on first init only. See
      # infrastructure/postgres/init/01-create-auth-database.sql.
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fulfillx} -d ${POSTGRES_DB:-fulfillx_orders}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - fulfillx-network

  redis:
    image: redis:8-alpine
    container_name: fulfillx-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - fulfillx-network

  redpanda:
    image: redpandadata/redpanda:v26.1.12
    container_name: fulfillx-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:${REDPANDA_KAFKA_PORT:-9092}
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:${REDPANDA_PANDAPROXY_PORT:-8082}
    ports:
      - "${REDPANDA_KAFKA_PORT:-9092}:9092"
      - "${REDPANDA_PANDAPROXY_PORT:-8082}:8082"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - fulfillx-network

volumes:
  postgres-data:
  redis-data:
  redpanda-data:

networks:
  fulfillx-network:
    name: fulfillx-network
