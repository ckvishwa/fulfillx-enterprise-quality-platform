server:
  port: 8085

spring:
  application:
    name: inventory-service
  datasource:
    url: ${INVENTORY_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fulfillx_inventory}
    username: ${INVENTORY_DATASOURCE_USERNAME:fulfillx}
    password: ${INVENTORY_DATASOURCE_PASSWORD:fulfillx}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns schema changes; Hibernate only validates the mapping.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

auth:
  jwt:
    # inventory-service validates auth-service-issued JWTs locally (same
    # signing secret, verified offline — no call back to auth-service on
    # every request). No hard-coded default: startup fails fast if unset,
    # same fail-fast contract as auth-service itself.
    secret: ${AUTH_JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger{36} - %msg%n"
