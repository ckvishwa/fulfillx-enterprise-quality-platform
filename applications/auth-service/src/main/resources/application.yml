server:
  port: 8083

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fulfillx_auth}
    username: ${AUTH_DATASOURCE_USERNAME:fulfillx}
    password: ${AUTH_DATASOURCE_PASSWORD:fulfillx}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns schema changes; Hibernate only validates the mapping.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

auth:
  jwt:
    # No default value on purpose: startup must fail fast rather than run
    # on a well-known placeholder secret. Local dev supplies this via
    # .env -> AUTH_JWT_SECRET (see .env.example).
    secret: ${AUTH_JWT_SECRET}
    expiration-minutes: ${AUTH_JWT_EXPIRATION_MINUTES:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger{36} - %msg%n"
