server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fulfillx_orders}
    username: ${SPRING_DATASOURCE_USERNAME:fulfillx}
    password: ${SPRING_DATASOURCE_PASSWORD:fulfillx}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns schema changes. Hibernate only validates the mapping
      # against the migrated schema; it must never auto-generate DDL.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger{36} - %msg%n"
